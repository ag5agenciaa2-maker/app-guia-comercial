<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AG5 Gerenciador de Vendas</title>

    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://unpkg.com/react@17/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@17/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --accent: #22c55e;
            --accent-glow: rgba(34, 197, 94, 0.3);
            --bg: #050505;
            --surface: rgba(20, 20, 20, 0.6);
            --border: rgba(255, 255, 255, 0.06);
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: #ffffff;
            margin: 0;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Efeito de Ruído Premium */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3e%3cfilter id='n'%3e%3cfeTurbulence type='fractalNoise' baseFrequency='0.65' stitchTiles='stitch'/%3e%3c/filter%3e%3crect width='100%25' height='100%25' filter='url(%23n)'/%3e%3c/svg%3e");
            opacity: 0.04;
            pointer-events: none;
            z-index: 500;
        }

        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 10% 10%, rgba(34, 197, 94, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 90% 90%, rgba(20, 80, 40, 0.05) 0%, transparent 40%);
            z-index: -1;
        }

        .glass-panel {
            background: var(--surface);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .premium-border {
            border: 1px solid var(--border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .premium-border:hover {
            border-color: rgba(34, 197, 94, 0.3);
            box-shadow: 0 0 20px var(--accent-glow);
            transform: translateY(-2px);
        }

        .text-mono {
            font-family: monospace;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            font-size: 0.65rem;
            opacity: 0.5;
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        .custom-scrollbar::-webkit-scrollbar {
            width: 4px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #333;
            border-radius: 10px;
        }

        input::placeholder {
            color: #444;
            font-weight: 300;
        }

        .btn-futuristic {
            position: relative;
            isolation: isolate;
            overflow: hidden;
        }

        .btn-futuristic::after {
            content: "";
            position: absolute;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
            width: 100%;
            height: 100%;
            top: 0;
            left: -100%;
            transform: skewX(-20deg);
            transition: 0.7s;
            z-index: -1;
        }

        .btn-futuristic:hover::after {
            left: 100%;
        }
    </style>
</head>

<body>
    <div id="root"></div>

    <script>
        const { useState, useEffect, useMemo } = React;

        const motivationalQuotes = [
            "Acredite em você mesmo e tudo será possível. ✨",
            "O sucesso é a soma de pequenos esforços repetidos dia após dia. 🚀",
            "Não espere por oportunidades extraordinárias. Agarre as comuns e torne-as grandes. 💪",
            "Sua atitude, não sua aptidão, determinará sua altitude. 🌟",
            "O único lugar onde o sucesso vem antes do trabalho é no dicionário. 💼",
            "Vender é ajudar. Concentre-se em como seu produto/serviço pode realmente ajudar seus clientes. 🤝",
            "A persistência realiza o impossível. Não desista! 🔥"
        ];

        const Modal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return React.createElement("div", { className: "fixed inset-0 bg-black bg-opacity-75 flex items-center justify-center z-[100] p-4" },
                React.createElement("div", { className: "bg-[#2c2c2c] p-5 md:p-6 rounded-xl shadow-2xl w-full max-w-md border border-gray-700" },
                    React.createElement("div", { className: "flex justify-between items-center mb-4" },
                        React.createElement("h3", { className: "text-lg md:text-xl font-semibold text-white" }, title || "Aviso"),
                        React.createElement("button", { onClick: onClose, className: "text-gray-400 hover:text-white" },
                            React.createElement("svg", { xmlns: "http://www.w3.org/2000/svg", className: "h-5 w-5 md:h-6 md:w-6", fill: "none", viewBox: "0 0 24 24", stroke: "currentColor" },
                                React.createElement("path", { strokeLinecap: "round", strokeLinejoin: "round", strokeWidth: "2", d: "M6 18L18 6M6 6l12 12" })
                            )
                        )
                    ),
                    React.createElement("div", { className: "text-gray-300 mb-5 md:mb-6 text-sm md:text-base" }, children),
                    React.createElement("div", { className: "flex justify-end" },
                        React.createElement(DarkButton, { onClick: onClose, buttonColor: "bg-green-700 hover:bg-green-800", className: "py-2 px-4 md:py-2.5 md:px-5 text-sm md:text-base" }, "OK")
                    )
                )
            );
        };

        const DarkButton = ({ children, onClick, className = '', buttonColor = 'bg-[#0a0a0a]', icon = null, style = {} }) => {
            return React.createElement("button", {
                onClick: onClick,
                style: style,
                className: `relative ${buttonColor} text-white py-4 px-6 rounded-xl premium-border btn-futuristic transition-all duration-500 hover:scale-[1.02] active:scale-95 group flex items-center justify-center space-x-3 overflow-hidden ${className}`
            },
                React.createElement("div", { className: "absolute inset-0 bg-gradient-to-r from-transparent via-white/5 to-transparent -translate-x-full group-hover:translate-x-full transition-transform duration-1000" }),
                icon && React.createElement("span", { className: "text-lg opacity-70 group-hover:opacity-100 transition-opacity" }, icon),
                React.createElement("span", { className: "relative z-10 text-xs md:text-sm font-semibold tracking-widest uppercase" }, children)
            );
        };

        const HomePage = ({
            appBgColor,
            motivationalMessage,
            searchTerm,
            handleSearch,
            showCompanyDetails,
            searchResults,
            setShowCompanyDetails,
            setCurrentPage,
            companiesData,
            showAlertModal
        }) => {

            const handleCompanyClick = (company) => {
                if (company.link && company.link !== "N/A") {
                    window.open(company.link, '_blank');
                } else {
                    const cleanCategory = (company.category || "").replace(/[^\p{L}\p{N}\s]/gu, '').trim();
                    const searchQuery = `${company.name} ${cleanCategory}`;
                    const googleSearchUrl = `https://www.google.com/search?q=${encodeURIComponent(searchQuery)}`;
                    window.open(googleSearchUrl, '_blank');
                }
                setShowCompanyDetails(false);
            };

            return React.createElement("div", { className: "relative min-h-screen flex flex-col items-center justify-start p-6 md:p-16 overflow-hidden animate-fade-in" },
                React.createElement("div", { className: "mesh-bg" }),

                React.createElement("div", { className: "w-full max-w-6xl grid grid-cols-1 md:grid-cols-3 gap-6 mb-16" },
                    // Coluna 1: Logo e Título
                    React.createElement("div", { className: "flex flex-col items-center md:items-start justify-center" },
                        React.createElement("div", { className: "animate-float" },
                            React.createElement("div", { className: "w-16 h-16 md:w-20 md:h-20 glass-panel rounded-2xl flex items-center justify-center border-white/10 mb-4 overflow-hidden p-2" },
                                React.createElement("img", {
                                    src: "Logo-%20AG5%20-%20Oficial%20(14).png",
                                    className: "w-full h-full object-contain",
                                    alt: "AG5 Logo"
                                })
                            )
                        ),
                        React.createElement("h1", { className: "text-4xl md:text-5xl font-bold tracking-tight text-white mb-2 uppercase" }, "Guia Comercial"),
                        React.createElement("div", { className: "text-mono text-green-500" }, "AG5 Agência")
                    ),

                    // Coluna 2: Dashboard de Empresas (Destaque Separado)
                    React.createElement("div", { className: "p-6 glass-panel rounded-2xl border-l-2 border-green-500/50 flex flex-col justify-center relative overflow-hidden group shadow-green-500/5 shadow-2xl" },
                        React.createElement("div", { className: "text-mono mb-4 text-[10px] flex justify-between items-center" },
                            React.createElement("span", null, "ECOSSISTEMA AG5"),
                            React.createElement("span", { className: "text-green-500 animate-pulse" }, "● LIVE")
                        ),
                        React.createElement("div", { className: "grid grid-cols-2 gap-4" },
                            // Criação
                            React.createElement("div", { className: "border-r border-white/10 pr-4" },
                                React.createElement("div", { className: "text-[10px] text-gray-500 uppercase tracking-widest mb-1" }, "Criações"),
                                React.createElement("div", { className: "text-4xl font-bold text-white tracking-tighter" },
                                    companiesData.filter(c => c.type?.toLowerCase().includes('cria')).length
                                )
                            ),
                            // Atualização
                            React.createElement("div", { className: "pl-2" },
                                React.createElement("div", { className: "text-[10px] text-gray-400 uppercase tracking-widest mb-1" }, "Atualizações"),
                                React.createElement("div", { className: "text-4xl font-bold text-green-500 tracking-tighter" },
                                    companiesData.filter(c => c.type?.toLowerCase().includes('atua')).length
                                )
                            )
                        ),
                        React.createElement("div", { className: "mt-4 pt-3 border-t border-white/5 flex justify-between items-end" },
                            React.createElement("div", null,
                                React.createElement("span", { className: "text-[10px] text-gray-500 uppercase block" }, "Total Geral"),
                                React.createElement("span", { className: "text-xl font-bold text-white" }, companiesData.length)
                            ),
                            React.createElement("div", { className: "text-[9px] text-gray-600 text-mono" }, "SINCRO_DATA_OK")
                        )
                    ),


                    // Coluna 3: Insights
                    React.createElement("div", { className: "p-6 glass-panel rounded-2xl border-l-2 border-yellow-500/50 flex flex-col justify-center" },
                        React.createElement("div", { className: "text-mono mb-2" }, "Insights do Dia"),
                        React.createElement("p", { className: "text-gray-400 text-sm italic font-light leading-relaxed" }, `“${motivationalMessage}”`)
                    )
                ),


                React.createElement("div", { className: "w-full max-w-2xl mb-12 relative" },
                    React.createElement("div", { className: "absolute -inset-1 bg-gradient-to-r from-green-500/10 to-transparent rounded-2xl blur opacity-20 transition duration-1000" }),
                    React.createElement("div", { className: "relative" },
                        React.createElement("input", {
                            type: "text",
                            className: "w-full pl-6 pr-12 py-6 rounded-xl bg-black/40 border border-white/10 text-white placeholder-gray-700 focus:outline-none focus:border-green-500/50 focus:ring-1 focus:ring-green-500/20 transition-all text-lg backdrop-blur-xl",
                            placeholder: "EXECUTAR BUSCA NO ECOSSISTEMA...",
                            value: searchTerm,
                            onChange: handleSearch
                        }),
                        React.createElement("div", { className: "absolute right-5 top-1/2 -translate-y-1/2 text-green-500/50 text-xs text-mono" }, "CTRL+K")
                    ),

                    showCompanyDetails && (
                        React.createElement("div", { className: "absolute top-full mt-2 left-0 right-0 glass-panel rounded-xl shadow-2xl border border-white/10 z-[100] max-h-96 overflow-y-auto custom-scrollbar p-2" },
                            searchResults.length > 0 ? (
                                searchResults.map((company) => (
                                    React.createElement("div", {
                                        key: company.id,
                                        onClick: () => handleCompanyClick(company),
                                        className: "hover:bg-white/5 p-4 rounded-lg cursor-pointer transition-all flex justify-between items-center group"
                                    },
                                        React.createElement("div", null,
                                            React.createElement("p", { className: "font-bold text-white group-hover:text-green-400 transition-colors uppercase tracking-tight" }, company.name),
                                            React.createElement("p", { className: "text-mono mt-1" }, company.category)
                                        ),
                                        React.createElement("span", { className: "text-green-500 opacity-0 group-hover:opacity-100 transition-opacity" }, "→")
                                    )
                                ))
                            ) : searchTerm.length > 0 && (
                                React.createElement("div", { className: "p-8 text-center text-mono" }, `NENHUM DADO ENCONTRADO PARA: ${searchTerm}`)
                            )
                        )
                    )
                ),

                React.createElement("div", { className: "w-full max-w-4xl grid grid-cols-1 md:grid-cols-3 gap-4" },
                    React.createElement("div", { className: "md:col-span-2 grid grid-cols-2 gap-4" },
                        React.createElement(DarkButton, { onClick: () => showAlertModal('Em Breve', 'Módulo de treinamento em vídeo.'), className: "h-32" }, "🎬 Tutoriais"),
                        React.createElement(DarkButton, { onClick: () => window.open('https://www.superchat.com/pt/tools/google-review-link-generator', '_blank'), className: "h-32" }, "⭐ Google Link"),
                        React.createElement(DarkButton, { onClick: () => setCurrentPage('client-results'), className: "h-32" }, "📊 Resultados"),
                        React.createElement(DarkButton, { onClick: () => window.open('https://drive.google.com/drive/folders/1Tq7zhcjDhXTxJ5q2T7vtJfyNqTF7W-7N', '_blank'), className: "h-32" }, "💬 Feedbacks")
                    ),
                    React.createElement("div", { className: "flex flex-col gap-4" },
                        React.createElement(DarkButton, { onClick: () => setCurrentPage('sales-insights'), className: "flex-1" }, "💡 Insights"),
                        React.createElement(DarkButton, { onClick: () => showAlertModal('Em Construção', 'Desenvolvimento acelerado.'), className: "flex-1" }, "📝 Metas"),
                        React.createElement(DarkButton, {
                            onClick: () => showAlertModal('Redirecionamento', 'Abrindo HUB de Vendas...'),
                            buttonColor: "bg-green-600/10 hover:bg-green-600/20",
                            className: "flex-1 border-green-500/30"
                        }, "🔗 CRM ODOO")
                    )
                ),

                React.createElement("footer", { className: "w-full max-w-4xl mt-20 pt-8 border-t border-white/5 flex flex-col md:flex-row justify-between items-center gap-6 opacity-40 hover:opacity-100 transition-opacity" },
                    React.createElement("div", { className: "text-mono" }, "© 2024 AG5 Agency — Strategic Intelligence"),
                    React.createElement("div", { className: "flex gap-8" },
                        React.createElement("button", { onClick: () => window.open('https://www.ag5agencia.com.br', '_self'), className: "text-xs uppercase tracking-widest hover:text-green-500 transition-colors" }, "Site Oficial AG5"),
                        React.createElement("button", { onClick: () => window.open('https://g.co/kgs/QoXq7fK', '_blank'), className: "text-xs uppercase tracking-widest hover:text-green-500 transition-colors" }, "Google AG5")
                    )
                )

            );
        };

        const ClientResultsPage = ({ setCurrentPage, appBgColor, showAlertModal }) => {
            return React.createElement("div", { className: "min-h-screen p-4 md:p-6 text-white flex flex-col items-center", style: { backgroundColor: appBgColor } },
                React.createElement("h2", { className: "text-2xl md:text-3xl font-bold mb-6 text-center" }, "Resultados dos Clientes"),
                React.createElement("div", { className: `w-full max-w-2xl bg-[#2c2c2c] rounded-xl p-6 shadow-xl border border-gray-700` },
                    React.createElement("p", { className: "text-gray-300 text-center mb-4 text-sm md:text-base" }, "Aqui você encontrará os PDFs com os resultados e relatórios de desempenho dos nossos clientes."),
                    React.createElement("div", { className: "grid grid-cols-1 md:grid-cols-2 gap-4" },
                        ['Relatório Mensal', 'Desempenho Google', 'Impacto Digital'].map(client => (
                            React.createElement("div", { key: client, className: "bg-gray-700 p-4 rounded-lg flex items-center justify-between shadow-md" },
                                React.createElement("span", { className: "font-semibold text-white text-sm" }, `${client}.pdf`),
                                React.createElement(DarkButton, { onClick: () => showAlertModal('Arquivo', 'Abrindo relatório...'), className: "py-1 px-3" }, "VER")
                            )
                        ))
                    )
                ),
                React.createElement(DarkButton, { onClick: () => setCurrentPage('home'), className: "mt-8", buttonColor: "bg-gray-700 hover:bg-gray-600" }, "🏠 Voltar")
            );
        };

        const SalesInsightsPage = ({ setCurrentPage, appBgColor }) => {
            return React.createElement("div", { className: "min-h-screen p-4 md:p-6 text-white flex flex-col items-center", style: { backgroundColor: appBgColor } },
                React.createElement("h2", { className: "text-2xl md:text-3xl font-bold mb-6 text-center" }, "💡 Insights de Vendas"),
                React.createElement("div", { className: `w-full max-w-3xl bg-[#2c2c2c] rounded-xl p-6 md:p-8 shadow-xl border border-gray-700 overflow-y-auto custom-scrollbar`, style: { maxHeight: 'calc(100vh - 150px)' } },
                    React.createElement("h3", { className: "text-xl text-green-500 font-bold mb-4" }, "Técnicas de Fechamento"),
                    React.createElement("p", { className: "text-gray-300 mb-4" }, "O segredo da venda não está no preço, mas no valor percebido pelo cliente. Foque em como a atualização do Google Meu Negócio vai trazer MAIS dinheiro para o negócio dele."),
                    React.createElement("ul", { className: "space-y-4" },
                        React.createElement("li", { className: "bg-white/5 p-4 rounded-lg border-l-4 border-green-500" },
                            React.createElement("strong", null, "A Prova Social:"), " Mostre fotos de perfis que já atualizamos e o antes/depois."
                        ),
                        React.createElement("li", { className: "bg-white/5 p-4 rounded-lg border-l-4 border-green-500" },
                            React.createElement("strong", null, "Escassez:"), " 'Tenho apenas 2 vagas para atualização prioritária esta semana na sua região'."
                        )
                    )
                ),
                React.createElement(DarkButton, { onClick: () => setCurrentPage('home'), className: "mt-8", buttonColor: "bg-gray-700 hover:bg-gray-600" }, "🏠 Voltar")
            );
        };

        function App() {
            const [companiesData, setCompaniesData] = useState([]);
            const [currentPage, setCurrentPage] = useState('home');
            const [searchTerm, setSearchTerm] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [showCompanyDetails, setShowCompanyDetails] = useState(false);
            const [motivationalMessage, setMotivationalMessage] = useState(motivationalQuotes[0]);
            const [modalInfo, setModalInfo] = useState({ isOpen: false, title: '', message: '' });

            const showAlertModal = (title, message) => setModalInfo({ isOpen: true, title, message });
            const closeModal = () => setModalInfo({ isOpen: false, title: '', message: '' });

            useEffect(() => {
                const SHEET_URL = "https://docs.google.com/spreadsheets/d/1ekgpdgAwFG6UWeRPy1PJfuuXHq23eEloNQ1KrobDWf4/export?format=csv";
                Papa.parse(SHEET_URL, {
                    download: true,
                    header: true,
                    skipEmptyLines: true,
                    transformHeader: (header) => header.replace(/^\ufeff/, "").trim(),
                    complete: (results) => {
                        const formatted = results.data.map(item => {
                            const getVal = (keys) => {
                                const found = Object.keys(item).find(k => keys.includes(k.trim().toLowerCase()));
                                return found ? item[found] : "";
                            };
                            return {
                                id: getVal(['id']) || Math.random(),
                                name: getVal(['nome', 'name']),
                                category: getVal(['categoria', 'category']),
                                link: getVal(['link']) || "N/A",
                                type: getVal(['tipo', 'type', 'status']) || "Geral",
                                keywords: (getVal(['keywords', 'palavras-chave']) || "").split(',').map(k => k.trim()).filter(Boolean)
                            };

                        }).filter(item => item.name);
                        setCompaniesData(formatted);
                    }
                });
            }, []);

            const handleSearch = (e) => {
                const term = e.target.value.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").trim();
                setSearchTerm(e.target.value);
                if (term.length > 0) {
                    const filtered = companiesData.filter(c => {
                        const n = (c.name || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        const cat = (c.category || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
                        const k = (c.keywords || []).map(kv => kv.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, ""));
                        return n.includes(term) || cat.includes(term) || k.some(kv => kv.includes(term));
                    });
                    setSearchResults(filtered);
                    setShowCompanyDetails(true);
                } else {
                    setSearchResults([]);
                    setShowCompanyDetails(false);
                }
            };

            const appBgColor = '#050505';

            return React.createElement("div", { className: "font-sans antialiased" },
                currentPage === 'home' ? React.createElement(HomePage, {
                    appBgColor, motivationalMessage, searchTerm, handleSearch,
                    showCompanyDetails, searchResults, setShowCompanyDetails,
                    setCurrentPage, companiesData, showAlertModal
                }) :
                    currentPage === 'client-results' ? React.createElement(ClientResultsPage, { setCurrentPage, appBgColor, showAlertModal }) :
                        React.createElement(SalesInsightsPage, { setCurrentPage, appBgColor }),
                React.createElement(Modal, { isOpen: modalInfo.isOpen, onClose: closeModal, title: modalInfo.title }, modalInfo.message)
            );
        }

        ReactDOM.render(React.createElement(App), document.getElementById('root'));
    </script>
</body>

</html>
